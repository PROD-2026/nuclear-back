services:
  mongo:
    image: mongo
    env_file: .env
    restart: unless-stopped

  redis:
    image: redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  api:
    build:
      context: .
      target: base
    depends_on:
      - mongo
      - redis
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - user_uploads:/uploads
    restart: unless-stopped

  worker:
    build:
      context: .
      target: celery
    depends_on:
      - redis
    env_file: .env
    restart: unless-stopped
    volumes:
      - user_uploads:/uploads

volumes:
  user_uploads:
