services:
  mongo:
    image: mongo
    env_file: .env

  redis:
    image: redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  api:
    build: .
    depends_on:
      - mongo
      - redis
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - user_uploads:/uploads
    restart: unless-stopped

  # TODO: Возможно для celery app стоит свой Dockerfile написать, частая практика, ну пока что так оставлю
  worker:
    build: .
    env_file: .env
    command: celery -A src.celery_app worker --loglevel=info
    restart: unless-stopped
    depends_on:
      - redis

volumes:
  user_uploads:
    depends_on:
      - redis
